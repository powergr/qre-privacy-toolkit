name: Fuzz

on:
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries required by Tauri's dependency tree
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          # cargo-fuzz requires the sanitizer component for -Zsanitizer=address
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ runner.os }}-${{ hashFiles('src-tauri/fuzz/Cargo.lock') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Pin tauri versions in fuzz workspace to match main workspace
        working-directory: src-tauri
        run: |
          # cargo metadata WITHOUT --no-deps so transitive dependencies are included.
          # With --no-deps only workspace members are listed; tauri and tauri-build
          # are dependencies, not members, so they were silently missing before.
          METADATA=$(cargo metadata --format-version 1)

          TAURI_VER=$(echo "$METADATA" | python3 -c "
          import json, sys
          pkgs = json.load(sys.stdin)['packages']
          match = next((p['version'] for p in pkgs if p['name'] == 'tauri'), None)
          print(match or '')
          ")

          TAURI_BUILD_VER=$(echo "$METADATA" | python3 -c "
          import json, sys
          pkgs = json.load(sys.stdin)['packages']
          match = next((p['version'] for p in pkgs if p['name'] == 'tauri-build'), None)
          print(match or '')
          ")

          echo "Main workspace resolved: tauri=$TAURI_VER  tauri-build=$TAURI_BUILD_VER"

          if [ -z "$TAURI_VER" ] || [ -z "$TAURI_BUILD_VER" ]; then
            echo "ERROR: could not resolve tauri or tauri-build version from main workspace"
            exit 1
          fi

          cd fuzz
          echo "Pinning fuzz workspace to same versions..."
          cargo +nightly update -p tauri --precise "$TAURI_VER"
          cargo +nightly update -p tauri-build --precise "$TAURI_BUILD_VER"
          echo "Pin complete. Fuzz Cargo.lock:"
          grep -A1 'name = "tauri"' Cargo.lock | head -20

      - name: Run fuzz target
        working-directory: src-tauri
        # -max_total_time=300 → stop after 5 minutes (keeps CI bill reasonable)
        # -jobs=2             → use both vCPUs on the runner
        # -runs=-1            → don't limit by iteration count, only by time
        run: cargo +nightly fuzz run fuzz_decrypt -- -max_total_time=300 -jobs=2 -runs=-1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: src-tauri/fuzz/artifacts/fuzz_decrypt/
          if-no-files-found: ignore
