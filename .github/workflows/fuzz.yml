name: Fuzz

on:
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system libraries required by Tauri's dependency tree
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Pin fuzz workspace tauri version to match main Cargo.lock
        working-directory: src-tauri
        run: |
          # Read the tauri version directly from the committed main Cargo.lock.
          # This is more reliable than cargo metadata because:
          #   1. tauri is not a direct dep of the fuzz workspace (only transitive
          #      through qre-gui), so cargo update --precise needs it already in
          #      a lockfile to work.
          #   2. The main Cargo.lock is the ground truth — it is what the working
          #      local build uses.
          #
          # The grep pattern matches the exact package block:
          #   [[package]]
          #   name = "tauri"
          #   version = "X.Y.Z"
          TAURI_VER=$(awk '/^name = "tauri"$/{found=1} found && /^version =/{
            gsub(/version = "|"/, ""); print; exit}' Cargo.lock)

          echo "Main Cargo.lock tauri version: '$TAURI_VER'"

          if [ -z "$TAURI_VER" ]; then
            echo "ERROR: could not read tauri version from src-tauri/Cargo.lock"
            echo "Make sure Cargo.lock is committed (git add src-tauri/Cargo.lock)"
            exit 1
          fi

          # Generate the fuzz lockfile from scratch using nightly.
          # Without this file cargo update --precise silently does nothing.
          cd fuzz
          cargo +nightly generate-lockfile 2>&1

          echo "=== Fuzz Cargo.lock tauri version BEFORE pin ==="
          awk '/^name = "tauri"$/{found=1} found && /^version =/{print; exit}' Cargo.lock

          # Force the fuzz workspace to use the same tauri as the main workspace.
          cargo +nightly update -p tauri --precise "$TAURI_VER" 2>&1

          echo "=== Fuzz Cargo.lock tauri version AFTER pin ==="
          awk '/^name = "tauri"$/{found=1} found && /^version =/{print; exit}' Cargo.lock

      - name: Run fuzz target
        working-directory: src-tauri
        # -max_total_time=300 -> stop after 5 minutes (keeps CI bill reasonable)
        # -jobs=2             -> use both vCPUs on the runner
        # -runs=-1            -> don't limit by iteration count, only by time
        run: cargo +nightly fuzz run fuzz_decrypt -- -max_total_time=300 -jobs=2 -runs=-1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: src-tauri/fuzz/artifacts/fuzz_decrypt/
          if-no-files-found: ignore
