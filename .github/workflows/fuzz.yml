name: Fuzz

on:
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system libraries required by Tauri's dependency tree
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ runner.os }}-${{ hashFiles('src-tauri/fuzz/Cargo.lock') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Diagnose and pin tauri versions in fuzz workspace
        working-directory: src-tauri
        run: |
          echo "=== Main workspace toolchain ==="
          cargo +nightly --version
          rustc +nightly --version

          echo "=== Resolving tauri versions from main workspace ==="
          # Use nightly for metadata so the resolver matches the fuzz build exactly.
          # Using stable here while the fuzz build uses nightly can produce different
          # resolution results for the same version constraints.
          METADATA=$(cargo +nightly metadata --format-version 1)

          TAURI_VER=$(echo "$METADATA" | python3 -c "
          import json, sys
          pkgs = json.load(sys.stdin)['packages']
          match = next((p['version'] for p in pkgs if p['name'] == 'tauri'), None)
          print(match or '')
          ")

          TAURI_BUILD_VER=$(echo "$METADATA" | python3 -c "
          import json, sys
          pkgs = json.load(sys.stdin)['packages']
          match = next((p['version'] for p in pkgs if p['name'] == 'tauri-build'), None)
          print(match or '')
          ")

          echo "Main workspace: tauri=$TAURI_VER  tauri-build=$TAURI_BUILD_VER"

          if [ -z "$TAURI_VER" ]; then
            echo "ERROR: tauri not found in main workspace metadata — aborting"
            exit 1
          fi

          echo "=== Fuzz workspace Cargo.toml ==="
          cat fuzz/Cargo.toml

          echo "=== Generating initial fuzz Cargo.lock ==="
          # cargo update --precise only works if Cargo.lock already exists.
          # cargo fetch creates it if missing. Without this step the pin
          # commands below silently do nothing and the mismatch persists.
          cd fuzz
          cargo +nightly fetch 2>&1

          echo "=== Pinning tauri in fuzz workspace ==="
          cargo +nightly update -p tauri --precise "$TAURI_VER" 2>&1

          if [ -n "$TAURI_BUILD_VER" ]; then
            echo "=== Pinning tauri-build in fuzz workspace ==="
            # tauri-build may not be a direct dep of the fuzz workspace --
            # if it isn't, this will print a warning and continue, which is fine.
            cargo +nightly update -p tauri-build --precise "$TAURI_BUILD_VER" 2>&1 || \
              echo "tauri-build not a direct fuzz dep — skipping pin (this is expected)"
          fi

          echo "=== Fuzz Cargo.lock tauri entries after pin ==="
          grep -A2 'name = "tauri"' Cargo.lock || echo "WARNING: no tauri entry in fuzz Cargo.lock"

      - name: Run fuzz target
        working-directory: src-tauri
        # -max_total_time=300 -> stop after 5 minutes (keeps CI bill reasonable)
        # -jobs=2             -> use both vCPUs on the runner
        # -runs=-1            -> don't limit by iteration count, only by time
        run: cargo +nightly fuzz run fuzz_decrypt -- -max_total_time=300 -jobs=2 -runs=-1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: src-tauri/fuzz/artifacts/fuzz_decrypt/
          if-no-files-found: ignore
