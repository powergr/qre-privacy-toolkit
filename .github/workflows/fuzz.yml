name: Fuzz

on:
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system libraries required by Tauri's dependency tree
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/fuzz/Cargo.lock') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz target
        working-directory: src-tauri
        # -max_total_time=300 -> stop after 5 minutes (keeps CI bill reasonable)
        # -jobs=2             -> use both vCPUs on the runner
        # -runs=-1            -> don't limit by iteration count, only by time
        run: cargo +nightly fuzz run fuzz_decrypt -- -max_total_time=300 -jobs=2 -runs=-1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: src-tauri/fuzz/artifacts/fuzz_decrypt/
          if-no-files-found: ignore
